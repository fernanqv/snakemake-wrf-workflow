[workspace]
name = "snakemake-wps-eessi"
version = "0.1.0"
description = "Workflow to compile WPS over EESSI using Snakemake"
authors = ["Pablo Orviz <orviz@ifca.es>", "Valvanuz Fernández <valvanuz.fernandez@unican.es"]
channels = ["conda-forge", "bioconda"] # Specific channels for HPC
platforms = ["linux-64"]

[dependencies]
python = ">=3.10"
conda = "*"

# --- SnakeMake ecosystem 8+ ---
snakemake = ">=8.0"
snakemake-executor-plugin-slurm = "*"

tcsh = "*"
cdo = ">=2.6.1,<3"

[tasks]
dry-run   = "snakemake --dry-run --profile"
run-slurm = "snakemake --profile"
run-local = "snakemake"

[pypi-dependencies]
jinja2-shell = ">=0.1.4, <0.2"
jinja2-cli = ">=1.0.1, <2"
cdsapi = "*"

